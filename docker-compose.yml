services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: Developer
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Default: "Server=db;Database=OpenQuiz;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Jwt__Issuer: ${JWT_ISSUER:-openquiz}
      Jwt__Audience: ${JWT_AUDIENCE:-openquiz}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_MINUTES:-15}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_DAYS:-30}
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__User: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-no-reply@openquiz.local}
      Smtp__FromName: ${SMTP_FROM_NAME:-OpenQuiz}
      Smtp__UseStartTls: ${SMTP_USE_STARTTLS:-true}
      App__PublicUrl: ${PUBLIC_URL:-http://localhost:8080}
      App__AdminEmail: ${ADMIN_EMAIL:-}
      Cors__AllowedOrigins: "${PUBLIC_URL:-http://localhost:8080},http://localhost:8080,http://127.0.0.1:8080"
    ports:
      - "${API_PORT:-5080}:8080"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL-}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  mssql-data:
